<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <radialGradient id="atomC" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="40%" stop-color="#e8e8e8"/>
      <stop offset="100%" stop-color="#555"/>
    </radialGradient>
    <radialGradient id="atomO" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ff8080"/>
      <stop offset="40%" stop-color="#DC143C"/>
      <stop offset="100%" stop-color="#8b0000"/>
    </radialGradient>
    <radialGradient id="atomN" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#aaaaff"/>
      <stop offset="40%" stop-color="#4466ff"/>
      <stop offset="100%" stop-color="#002299"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#DC143C" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="bondGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#666"/>
      <stop offset="100%" stop-color="#333"/>
    </linearGradient>
    <linearGradient id="ringFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#DC143C" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.06"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="#0a0a0a" rx="12"/>

  <!-- Subtle grid lines for depth -->
  <g opacity="0.04" stroke="#DC143C" stroke-width="0.5">
    <line x1="0" y1="50" x2="400" y2="50"/><line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="150" x2="400" y2="150"/><line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="250" x2="400" y2="250"/>
    <line x1="50" y1="0" x2="50" y2="300"/><line x1="100" y1="0" x2="100" y2="300"/>
    <line x1="150" y1="0" x2="150" y2="300"/><line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="250" y1="0" x2="250" y2="300"/><line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="350" y1="0" x2="350" y2="300"/>
  </g>

  <!-- === MOLECULE: A drug-like scaffold with 3D depth === -->

  <!-- Ring A (left benzene) - drawn with bonds first so atoms render on top -->
  <!-- C1-C2 -->
  <line x1="130" y1="95" x2="185" y2="70" stroke="url(#bondGrad)" stroke-width="5" stroke-linecap="round" filter="url(#shadow)"/>
  <line x1="130" y1="95" x2="185" y2="70" stroke="#888" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <!-- C2-C3 -->
  <line x1="185" y1="70" x2="240" y2="95" stroke="url(#bondGrad)" stroke-width="5" stroke-linecap="round" filter="url(#shadow)"/>
  <!-- C3-C4 -->
  <line x1="240" y1="95" x2="240" y2="155" stroke="url(#bondGrad)" stroke-width="5" stroke-linecap="round" filter="url(#shadow)"/>
  <!-- C4-C5 -->
  <line x1="240" y1="155" x2="185" y2="180" stroke="url(#bondGrad)" stroke-width="5" stroke-linecap="round" filter="url(#shadow)"/>
  <!-- C5-C6 -->
  <line x1="185" y1="180" x2="130" y2="155" stroke="url(#bondGrad)" stroke-width="5" stroke-linecap="round" filter="url(#shadow)"/>
  <!-- C6-C1 -->
  <line x1="130" y1="155" x2="130" y2="95" stroke="url(#bondGrad)" stroke-width="5" stroke-linecap="round" filter="url(#shadow)"/>

  <!-- Ring A aromatic circle -->
  <ellipse cx="185" cy="125" rx="48" ry="42" fill="url(#ringFill)" stroke="#DC143C" stroke-width="1.5" stroke-opacity="0.4" stroke-dasharray="4,3"/>

  <!-- Ring B (right, connected at C3-C4 bond) -->
  <!-- Extended from C3-C4: make a fused ring -->
  <!-- Actually let's make this a connected side chain / second ring -->

  <!-- Connecting bond C3 to Ring B top -->
  <line x1="240" y1="95" x2="295" y2="70" stroke="url(#bondGrad)" stroke-width="5" stroke-linecap="round" filter="url(#shadow)"/>
  <!-- Ring B C1-C2 -->
  <line x1="295" y1="70" x2="350" y2="95" stroke="url(#bondGrad)" stroke-width="5" stroke-linecap="round" filter="url(#shadow)"/>
  <!-- Ring B C2-C3 -->
  <line x1="350" y1="95" x2="350" y2="155" stroke="url(#bondGrad)" stroke-width="5" stroke-linecap="round" filter="url(#shadow)"/>
  <!-- Ring B C3-C4 -->
  <line x1="350" y1="155" x2="295" y2="180" stroke="url(#bondGrad)" stroke-width="5" stroke-linecap="round" filter="url(#shadow)"/>
  <!-- Ring B C4-C5 -->
  <line x1="295" y1="180" x2="240" y2="155" stroke="url(#bondGrad)" stroke-width="5" stroke-linecap="round" filter="url(#shadow)"/>

  <!-- Ring B aromatic circle -->
  <ellipse cx="295" cy="125" rx="48" ry="42" fill="url(#ringFill)" stroke="#DC143C" stroke-width="1.5" stroke-opacity="0.4" stroke-dasharray="4,3"/>

  <!-- Side chain bonds (going down from Ring A C5) -->
  <line x1="185" y1="180" x2="185" y2="230" stroke="url(#bondGrad)" stroke-width="5" stroke-linecap="round" filter="url(#shadow)"/>
  <line x1="185" y1="230" x2="155" y2="265" stroke="url(#bondGrad)" stroke-width="5" stroke-linecap="round" filter="url(#shadow)"/>
  <!-- Double bond for carbonyl-like -->
  <line x1="185" y1="230" x2="215" y2="265" stroke="url(#bondGrad)" stroke-width="5" stroke-linecap="round" filter="url(#shadow)"/>
  <line x1="185" y1="230" x2="215" y2="258" stroke="#DC143C" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Side chain from Ring A C6 -->
  <line x1="130" y1="95" x2="75" y2="70" stroke="url(#bondGrad)" stroke-width="5" stroke-linecap="round" filter="url(#shadow)"/>

  <!-- === ATOMS (rendered on top for 3D depth) === -->

  <!-- Ring A carbons -->
  <circle cx="130" cy="95" r="14" fill="url(#atomC)" filter="url(#shadow)"/>
  <circle cx="185" cy="70" r="14" fill="url(#atomC)" filter="url(#shadow)"/>
  <circle cx="240" cy="95" r="14" fill="url(#atomC)" filter="url(#shadow)"/>
  <circle cx="240" cy="155" r="14" fill="url(#atomC)" filter="url(#shadow)"/>
  <circle cx="185" cy="180" r="14" fill="url(#atomC)" filter="url(#shadow)"/>
  <circle cx="130" cy="155" r="14" fill="url(#atomC)" filter="url(#shadow)"/>

  <!-- Ring B carbons -->
  <circle cx="295" cy="70" r="14" fill="url(#atomC)" filter="url(#shadow)"/>
  <circle cx="350" cy="95" r="14" fill="url(#atomC)" filter="url(#shadow)"/>
  <circle cx="350" cy="155" r="14" fill="url(#atomC)" filter="url(#shadow)"/>
  <circle cx="295" cy="180" r="14" fill="url(#atomC)" filter="url(#shadow)"/>

  <!-- Heteroatoms (Oxygen - crimson) -->
  <circle cx="215" cy="265" r="16" fill="url(#atomO)" filter="url(#glow)"/>
  <text x="215" y="269" text-anchor="middle" fill="#fff" font-size="10" font-family="Arial, sans-serif" font-weight="bold">O</text>

  <circle cx="75" cy="70" r="16" fill="url(#atomO)" filter="url(#glow)"/>
  <text x="75" y="74" text-anchor="middle" fill="#fff" font-size="10" font-family="Arial, sans-serif" font-weight="bold">O</text>

  <!-- Nitrogen -->
  <circle cx="155" cy="265" r="15" fill="url(#atomN)" filter="url(#shadow)"/>
  <text x="155" y="269" text-anchor="middle" fill="#fff" font-size="10" font-family="Arial, sans-serif" font-weight="bold">N</text>

  <!-- Labels on some carbons (small) -->
  <text x="130" y="99" text-anchor="middle" fill="#fff" font-size="8" font-family="Arial, sans-serif" font-weight="bold" opacity="0.6">C</text>
  <text x="350" y="159" text-anchor="middle" fill="#fff" font-size="8" font-family="Arial, sans-serif" font-weight="bold" opacity="0.6">C</text>

  <!-- Specular highlights for 3D effect -->
  <circle cx="126" cy="91" r="4" fill="#fff" opacity="0.35"/>
  <circle cx="181" cy="66" r="4" fill="#fff" opacity="0.35"/>
  <circle cx="236" cy="91" r="4" fill="#fff" opacity="0.35"/>
  <circle cx="236" cy="151" r="4" fill="#fff" opacity="0.35"/>
  <circle cx="181" cy="176" r="4" fill="#fff" opacity="0.35"/>
  <circle cx="126" cy="151" r="4" fill="#fff" opacity="0.35"/>
  <circle cx="291" cy="66" r="4" fill="#fff" opacity="0.35"/>
  <circle cx="346" cy="91" r="4" fill="#fff" opacity="0.35"/>
  <circle cx="346" cy="151" r="4" fill="#fff" opacity="0.35"/>
  <circle cx="291" cy="176" r="4" fill="#fff" opacity="0.35"/>
  <circle cx="211" cy="261" r="5" fill="#fff" opacity="0.45"/>
  <circle cx="71" cy="66" r="5" fill="#fff" opacity="0.45"/>
  <circle cx="151" cy="261" r="4.5" fill="#fff" opacity="0.4"/>

  <!-- Subtle floating particles for atmosphere -->
  <g opacity="0.15">
    <circle cx="30" cy="40" r="1.5" fill="#DC143C"><animate attributeName="cy" values="40;35;40" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="370" cy="250" r="1" fill="#DC143C"><animate attributeName="cy" values="250;243;250" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="50" cy="270" r="1.2" fill="#fff"><animate attributeName="cy" values="270;264;270" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="380" cy="60" r="1" fill="#fff"><animate attributeName="cy" values="60;54;60" dur="4.2s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Title -->
  <text x="200" y="28" text-anchor="middle" fill="#DC143C" font-size="13" font-family="Arial, sans-serif" font-weight="bold" letter-spacing="3" opacity="0.6">MOLECULAR BIMODAL REPRESENTATION</text>
</svg>
