<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 320" width="100%" height="100%">
  <defs>
    <radialGradient id="sphereC" cx="30%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#cccccc"/>
      <stop offset="65%" stop-color="#555555"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </radialGradient>
    <radialGradient id="sphereO" cx="30%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#ff6666"/>
      <stop offset="30%" stop-color="#DC143C"/>
      <stop offset="65%" stop-color="#990000"/>
      <stop offset="100%" stop-color="#330000"/>
    </radialGradient>
    <radialGradient id="sphereN" cx="30%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#9999ff"/>
      <stop offset="30%" stop-color="#3355ee"/>
      <stop offset="65%" stop-color="#0022aa"/>
      <stop offset="100%" stop-color="#000044"/>
    </radialGradient>
    <radialGradient id="glowO" cx="40%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="40%" stop-color="#DC143C"/>
      <stop offset="100%" stop-color="#8b0000"/>
    </radialGradient>
    <filter id="shadow3d">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glowRed">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#DC143C" flood-opacity="0.7"/>
    </filter>
    <filter id="ambientGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="500" height="320" fill="#0a0a0a" rx="12"/>

  <g transform="translate(250, 160)">
    <animateTransform attributeName="transform" attributeType="XML" type="rotate"
      from="0" to="360" dur="14s" repeatCount="indefinite"
      additive="sum"/>

    <!-- Layer 2: Bonds (drawn behind atoms) -->
    <g stroke-width="4.5" stroke-linecap="round" filter="url(#shadow3d)">
      <!-- Ring A (left) -->
      <line x1="-75" y1="-55" x2="-25" y2="-80" stroke="#777"/>
      <line x1="-25" y1="-80" x2="25" y2="-55" stroke="#777"/>
      <line x1="25" y1="-55" x2="25" y2="5" stroke="#888"/>
      <line x1="25" y1="5" x2="-25" y2="30" stroke="#888"/>
      <line x1="-25" y1="30" x2="-75" y2="5" stroke="#777"/>
      <line x1="-75" y1="5" x2="-75" y2="-55" stroke="#777"/>

      <!-- Ring A double bond indicator -->
      <line x1="-75" y1="-55" x2="-25" y2="-80" stroke="#DC143C" stroke-width="1.8" opacity="0.5" transform="translate(2, -1)"/>

      <!-- Ring B (right, fused) -->
      <line x1="25" y1="-55" x2="75" y2="-80" stroke="#888"/>
      <line x1="75" y1="-80" x2="125" y2="-55" stroke="#777"/>
      <line x1="125" y1="-55" x2="125" y2="5" stroke="#777"/>
      <line x1="125" y1="5" x2="75" y2="30" stroke="#888"/>
      <line x1="75" y1="30" x2="25" y2="5" stroke="#888"/>

      <!-- Ring B alternating bond -->
      <line x1="75" y1="-80" x2="125" y2="-55" stroke="#DC143C" stroke-width="1.8" opacity="0.5" transform="translate(0, -2)"/>

      <!-- Side chain down from Ring A -->
      <line x1="-25" y1="30" x2="-25" y2="75" stroke="#666"/>
      <line x1="-25" y1="75" x2="-55" y2="110" stroke="#666"/>
      <line x1="-25" y1="75" x2="5" y2="110" stroke="#666"/>

      <!-- Double bond in side chain -->
      <line x1="-25" y1="75" x2="5" y2="110" stroke="#DC143C" stroke-width="2.5" opacity="0.6" transform="translate(0, -2)"/>

      <!-- Side chain from Ring B -->
      <line x1="75" y1="30" x2="100" y2="65" stroke="#666"/>

      <!-- Side chain up from Ring A -->
      <line x1="-75" y1="-55" x2="-105" y2="-90" stroke="#777"/>

      <!-- NH2 group -->
      <line x1="-25" y1="-80" x2="-35" y2="-120" stroke="#666"/>
    </g>

    <!-- Layer 1: Aromatic indicator rings (partial transparency) -->
    <ellipse cx="0" cy="-25" rx="48" ry="40" fill="none" stroke="#DC143C" stroke-width="1.5" stroke-opacity="0.25" stroke-dasharray="3,4" transform="rotate(-5)"/>
    <ellipse cx="100" cy="-25" rx="48" ry="40" fill="none" stroke="#DC143C" stroke-width="1.5" stroke-opacity="0.25" stroke-dasharray="3,4" transform="rotate(-5)"/>

    <!-- Layer 3: Atoms -->
    <!-- Ring A carbons -->
    <circle cx="-75" cy="-55" r="11" fill="url(#sphereC)" filter="url(#shadow3d)"/>
    <circle cx="-25" cy="-80" r="11" fill="url(#sphereC)" filter="url(#shadow3d)"/>
    <circle cx="25" cy="-55" r="11" fill="url(#sphereC)" filter="url(#shadow3d)"/>
    <circle cx="25" cy="5" r="11" fill="url(#sphereC)" filter="url(#shadow3d)"/>
    <circle cx="-25" cy="30" r="11" fill="url(#sphereC)" filter="url(#shadow3d)"/>
    <circle cx="-75" cy="5" r="11" fill="url(#sphereC)" filter="url(#shadow3d)"/>

    <!-- Ring B carbons -->
    <circle cx="75" cy="-80" r="11" fill="url(#sphereC)" filter="url(#shadow3d)"/>
    <circle cx="125" cy="-55" r="11" fill="url(#sphereC)" filter="url(#shadow3d)"/>
    <circle cx="125" cy="5" r="11" fill="url(#sphereC)" filter="url(#shadow3d)"/>
    <circle cx="75" cy="30" r="11" fill="url(#sphereC)" filter="url(#shadow3d)"/>

    <!-- Heteroatoms -->
    <!-- Oxygen in side chain -->
    <circle cx="5" cy="110" r="14" fill="url(#sphereO)" filter="url(#glowRed)"/>
    <!-- Oxygen in side chain from Ring B -->
    <circle cx="100" cy="65" r="14" fill="url(#sphereO)" filter="url(#glowRed)"/>
    <!-- Oxygen at top -->
    <circle cx="-105" cy="-90" r="14" fill="url(#sphereO)" filter="url(#glowRed)"/>

    <!-- Nitrogen in side chain -->
    <circle cx="-55" cy="110" r="13" fill="url(#sphereN)" filter="url(#shadow3d)"/>
    <!-- Nitrogen in NH2 -->
    <circle cx="-35" cy="-120" r="13" fill="url(#sphereN)" filter="url(#shadow3d)"/>

    <!-- Specular highlights for 3D depth -->
    <g fill="#ffffff">
      <circle cx="-78" cy="-58" r="3.5" opacity="0.4"/>
      <circle cx="-28" cy="-83" r="3.5" opacity="0.4"/>
      <circle cx="22" cy="-58" r="3.5" opacity="0.4"/>
      <circle cx="22" cy="2" r="3.5" opacity="0.4"/>
      <circle cx="-28" cy="27" r="3.5" opacity="0.4"/>
      <circle cx="-78" cy="2" r="3.5" opacity="0.4"/>
      <circle cx="72" cy="-83" r="3.5" opacity="0.4"/>
      <circle cx="122" cy="-58" r="3.5" opacity="0.4"/>
      <circle cx="122" cy="2" r="3.5" opacity="0.4"/>
      <circle cx="72" cy="27" r="3.5" opacity="0.4"/>

      <!-- O/N highlights -->
      <circle cx="2" cy="107" r="4.5" opacity="0.5"/>
      <circle cx="97" cy="62" r="4.5" opacity="0.5"/>
      <circle cx="-108" cy="-93" r="4.5" opacity="0.5"/>
      <circle cx="-58" cy="107" r="4" opacity="0.45"/>
      <circle cx="-38" cy="-123" r="4" opacity="0.45"/>
    </g>

    <!-- Layer 4: Hydrogen atoms (small, peripheral) -->
    <g fill="url(#sphereC)" filter="url(#shadow3d)">
      <circle cx="-90" cy="-30" r="6"/>
      <circle cx="40" cy="-70" r="6"/>
      <circle cx="140" cy="-35" r="6"/>
      <circle cx="140" cy="25" r="6"/>
      <circle cx="-90" cy="25" r="6"/>
      <circle cx="60" cy="50" r="6"/>
      <!-- H's on NH2 -->
      <circle cx="-25" cy="-135" r="6"/>
      <circle cx="-50" cy="-130" r="6"/>
    </g>

    <!-- Inner glow ring for depth -->
    <ellipse cx="25" cy="-25" rx="70" ry="55" fill="none" stroke="#DC143C" stroke-width="0.8" opacity="0.08" transform="rotate(-5)"/>
  </g>

  <!-- Corner accents -->
  <path d="M20,20 L60,20 M20,20 L20,60" stroke="#DC143C" stroke-width="1.5" opacity="0.3" fill="none"/>
  <path d="M480,20 L440,20 M480,20 L480,60" stroke="#DC143C" stroke-width="1.5" opacity="0.3" fill="none"/>
  <path d="M20,300 L60,300 M20,300 L20,260" stroke="#DC143C" stroke-width="1.5" opacity="0.3" fill="none"/>
  <path d="M480,300 L440,300 M480,300 L480,260" stroke="#DC143C" stroke-width="1.5" opacity="0.3" fill="none"/>
</svg>
