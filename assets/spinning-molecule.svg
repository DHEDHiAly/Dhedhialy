<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Spinning molecule">
  <rect width="120" height="120" fill="#ffffff" />

  <g transform="translate(60,60)">
    <g stroke="#111111" stroke-width="2.5" fill="none">
      <line x1="0" y1="0" x2="0" y2="-34" />
      <line x1="0" y1="0" x2="30" y2="17" />
      <line x1="0" y1="0" x2="-30" y2="17" />
      <line x1="0" y1="-34" x2="30" y2="17" />
      <line x1="30" y1="17" x2="-30" y2="17" />
      <line x1="-30" y1="17" x2="0" y2="-34" />
    </g>

    <circle cx="0" cy="0" r="8" fill="#000000" />
    <circle cx="0" cy="-34" r="7" fill="#8B0000" />
    <circle cx="30" cy="17" r="7" fill="#111111" />
    <circle cx="-30" cy="17" r="7" fill="#ffffff" stroke="#8B0000" stroke-width="2.5" />

    <animateTransform
      attributeName="transform"
      attributeType="XML"
      type="rotate"
      from="0"
      to="360"
      dur="6s"
      repeatCount="indefinite" />
  </g>
</svg>
